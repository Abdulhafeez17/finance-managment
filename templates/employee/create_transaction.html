```html
{% extends "layout.html" %}

{% block title %}
Create Transaction
{% endblock %}

{% block main %}

<div class="container mt-4" style="max-width: 500px;">
    <h2 class="text-center mb-4">Create Transaction</h2>

    <form action="/employee/create_transaction" method="POST" enctype="multipart/form-data">

        <!-- Type -->
        <div class="mb-3">
            <label class="form-label">Type</label>
            <select name="type" id="type" class="form-control" required onchange="toggleFields()">
                <option value="">Select</option>
                <option value="income">Income</option>
                <option value="expense">Expense</option>
            </select>
        </div>

        <!-- Customer -->
        <div class="mb-3" id="customer-field" style="display:none;">
            <label class="form-label">Customer</label>
            <select name="customer_id" id="customer" class="form-control">
                <option value="">Select Customer</option>

                {% for customer in customers %}
                    <option value="{{ customer.id }}">
                        {{ customer.name }}
                    </option>
                {% endfor %}
            </select>
        </div>

        <!-- Amount -->
        <div class="mb-3">
            <label class="form-label">Amount</label>
            <input
                type="number"
                step="0.01"
                name="amount"
                class="form-control"
                required>
        </div>

        <!-- Category -->
        <div class="mb-3">
            <label class="form-label">Category</label>

            <select name="category" id="category" class="form-control" required>
                <option value="">Select Type First</option>
            </select>
        </div>

        <!-- Description -->
        <div class="mb-3">
            <label class="form-label">Description</label>

            <textarea
                name="description"
                class="form-control"
                rows="3"></textarea>
        </div>

        <!-- Proof -->
        <div class="mb-3">
            <label class="form-label">Proof</label>

            <input
                type="file"
                name="proof"
                class="form-control">
        </div>

        <button class="btn btn-success w-100">
            Submit
        </button>

    </form>
</div>

<script>

const incomeCategories = [
    "Sales",
    "Services",
    "Subscription",
    "Consulting",
    "Other"
];

const expenseCategories = [
    "Salary",
    "Rent",
    "Utilities",
    "Office Supplies",
    "Equipment",
    "Marketing",
    "Travel",
    "Miscellaneous"
];

function toggleFields() {

    const type = document.getElementById("type").value;

    const customerField = document.getElementById("customer-field");
    const customer = document.getElementById("customer");

    const category = document.getElementById("category");

    // Clear existing options
    category.innerHTML = "";

    // Default option
    const defaultOption = document.createElement("option");
    defaultOption.value = "";
    defaultOption.text = "Select Category";
    category.appendChild(defaultOption);

    if (type === "income") {

        customerField.style.display = "block";
        customer.required = true;

        incomeCategories.forEach(function(item){

            let option = document.createElement("option");
            option.value = item;
            option.text = item;

            category.appendChild(option);

        });

    }
    else if (type === "expense") {

        customerField.style.display = "none";
        customer.required = false;
        customer.value = "";

        expenseCategories.forEach(function(item){

            let option = document.createElement("option");
            option.value = item;
            option.text = item;

            category.appendChild(option);

        });

    }
    else {

        customerField.style.display = "none";
        customer.required = false;
        customer.value = "";

    }

}

</script>

{% endblock %}
```
