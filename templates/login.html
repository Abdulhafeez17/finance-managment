{% extends "layout.html" %}

{% block title %}
Login
{% endblock %}

{% block main %}

<div class="container" style="max-width: 400px;">
    <h3 class="mb-4 text-center">Login</h3>

    <form action="/login" method="POST">

        
        <div class="mb-3">
            <label class="form-label">Email</label>
            <input type="email" name="email" class="form-control" placeholder="Enter email" autocomplete="off">
        </div>

        <div class="mb-3">
            <label class="form-label">Password</label>

            <div class="input-group">
                <input type="password" id="password" name="password" class="form-control" placeholder="Enter password" required autocomplete="new-password">

                <button class="btn btn-outline-secondary" type="button" onclick="togglePassword()">
                    𓁹
                </button>
            </div>
        </div>
        
<!--         
        <div class="mb-3">
            <label class="form-label">Role</label>
            <select name="role" class="form-control" required>
                <option value="">-- Select Role --</option>
                <option value="employee">Employee</option>
                <option value="manager">Manager</option>
                <option value="admin">Admin</option>
            </select>
        </div>

         -->
        <div class="d-grid">
            <button type="submit" class="btn btn-primary">Login</button>
        </div>

    </form>
</div>

<script>
function togglePassword() {
    const password = document.getElementById("password");

    if (password.type === "password") {
        password.type = "text";
    } else {
        password.type = "password";
    }
}
</script>

{% endblock %}
